# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
# appearance:
#   # mode: system
#   theme:
#     mode: system
#     pack: custom_theme
#   # color: emerald
#   # font: serif
hugoblox:
  theme:
    custom_theme:
      light:
        primary: '#677E76'
        secondary: '#97B8AA'
        accent: '#657B83'
        background: '#F2F2F2'
        text: '#45534E'
        header-background: '#C0D8CF'
        header-text: '#54635E'
        footer-background: '#C0D8CF'
        footer-text: '#54635E'
      dark:
        primary: '#97B8AA'
        secondary: '#C0D8CF'
        accent: '#657B83'
        background: '#54635E'
        text: '#F2F2F2'
        header-background: '#677E76'
        header-text: '#C0D8CF'
        footer-background: '#677E76'
        footer-text: '#C0D8CF'
  typography:
    pack: "modern"
    families:
      heading: "Montserrat"  # Override just heading
      body: "Merriweather"                # Keep body from pack
      code: "Space Code"           # Override code font

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: '' # Site meta description for search engines and social sharing
    twitter: '' # Twitter/X handle for Twitter Cards (without @)
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"  # navbar | navbar-simple | minimal
    show_search: true
    show_theme_chooser: true
    theme_picker: true
    logo:
      text: "Lee-Ann Vidal Covas, PhD"

# Site footer
footer:
  copyright:
    notice: '© {year} Me. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false

# Security
hugoblox:
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow                 # deny | sameorigin | allow - allow enables iframe embedding
    permissions_policy: ""