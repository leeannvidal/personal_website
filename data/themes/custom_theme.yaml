hugoblox:
  meta:
    format: hugoblox-theme@1
    name:  custom-theme
    vendor: 
    version: 
    license: MIT
    description:  Based on LA's Wix Website
  type: dual
  dark:
    colors:
      primary: "#97B8AA"
      secondary: "#C0D8CF"
      neutral: "#657B83"
    surfaces:
      background: "#54635e"
      foreground: "#F2F2F2"
      header:
        background: "#677E76"
        foreground: "#C0D8CF"
      footer:
        background: "#677E76"
        foreground: "#C0D8CF"
  light:
    colors:
      primary: "#677E76"
      secondary: "#97B8AA"
      neutral: "#657B83"
    surfaces:
      background: "#F2F2F2"
      foreground: "#45534e"
      header:
        background: "#C0D8CF"
        foreground: "#54635e"
      footer:
        background: "#C0D8CF"
        foreground: "#54635E"
