hugoblox:
  meta:
    format: hugoblox-theme@1
    name: LA
    vendor:
    version:
    license: MIT
    description: Based on LA's Wix Website
  type: dual

  light:
    colors:
      primary: "#677E76"
      secondary: "#97B8AA"
      neutral: "#85A197"
    surfaces:
      background: "#F2F2F2"
      foreground: "#5B5B5B"
      header:
        background: "#C0D8CF"
        foreground: "#5F5F5F"
      footer:
        background: "#C0D8CF"
        foreground: "#677E76"

  dark:
    colors:
      primary: "#97B8AA"
      secondary: "#C0D8CF"
      neutral: "#85A197"
    surfaces:
      background: "#2A3430"
      foreground: "#F2F2F2"
      header:
        background: "#3C4B46"
        foreground: "#C0D8CF"
      footer:
        background: "#3C4B46"
        foreground: "#C0D8CF"