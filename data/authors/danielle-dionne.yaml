# Short bio (supports Markdown)
bio: |
  Senior Learning Scientist at Duolingo, where she also writes for the [Duolingo Blog](https://blog.duolingo.com/author/danielle/). Received her PhD in Linguistics from Boston University, where she specialized in sociolinguistics and language variation. 
# Her dissertation examined contextual frequency and morphosyntactic variation in Spanish subject pronouns using an exemplar-theoretic variationist framework. Also conducts research in computational linguistics and Bayesian pragmatics.

