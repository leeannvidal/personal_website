# Display name
title: Catalina Méndez Vallejo

# Role/position
role: Senior Lecturer and Acting Co-Director of Spanish Language Program

# Short bio (supports Markdown)
bio: |
  Senior Lecturer in Spanish and Portuguese and Acting Co-Director of the Spanish Language Program at Princeton University. Specializes in syntax, with research on the Focalizing Ser structure, prosody in requests, Spanish word order, sociolinguistic variation in future tenses, and discourse markers. 
# Received a dual PhD in Linguistics and Hispanic Linguistics from Indiana University (2009). Currently developing *Voces de Princeton*, a corpus of spoken interviews with the Spanish-speaking Princeton community.

